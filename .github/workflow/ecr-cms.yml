name: Build and Push CMS to ECR

on:
  push:
    branches: [ main ]
    paths:
      - 'cms/**'
      - '.github/workflows/ecr-cms.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    environment: aws-cicd-cms
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::371117669983:role/gha-ecr-cms-abby
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/abbynbev-simako
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./cms
          file: ./cms/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}