name: Build and Push CMS to ECR

on:
  push:
    branches:
      - main
    # Bagian 'paths' dihapus agar setiap ada push ke branch main, action langsung jalan.
    # Jika ingin tetap pakai paths, pastikan jalurnya benar (misal hapus "cms/" jika file di root)
  workflow_dispatch: # Agar tombol manual di tab Actions tetap ada

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    environment: aws-cicd-cms
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Sangat disarankan pakai secrets agar lebih aman dan dinamis
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/abbynbev-simako
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Tambahkan ini untuk performa lebih cepat di GitHub Actions
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_APP_NAME=${{ secrets.VITE_APP_NAME }}
            VITE_ADONIS_API_URL=${{ secrets.VITE_ADONIS_API_URL }}